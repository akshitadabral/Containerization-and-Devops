services:

  database:
    build: ./database
    container_name: postgres_db
    restart: always

    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: akshita

    volumes:
      - pgdata:/var/lib/postgresql/data

    networks:
      ipvlan_net:
        ipv4_address: 192.168.200.21

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5


  backend:
    build: ./backend
    container_name: node_backend
    restart: always

    environment:
      DB_HOST: 192.168.200.21
      POSTGRES_DB: mydb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: akshita

    depends_on:
      database:
        condition: service_healthy

    networks:
      ipvlan_net:
        ipv4_address: 192.168.200.20
      bridge_net:   

    ports:
      - "3000:3000"   


volumes:
  pgdata:


networks:
  ipvlan_net:
    driver: ipvlan
    driver_opts:
      parent: eth0
    ipam:
      config:
        - subnet: 192.168.200.0/24
          gateway: 192.168.200.1

  bridge_net:
    driver: bridge